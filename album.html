<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum de Fotos</title>
    <style>
        body {
            background-color: #e0e5ec;
            font-family: sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .album {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        .foto {
            background: #fff;
            padding: 15px 15px 50px 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease, z-index 0s;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
        }

        .foto img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border: 1px solid #f0f0f0;
        }

        /* Efeito de rotação alternada para parecerem fotos jogadas na mesa */
        .foto:nth-child(odd) {
            transform: rotate(-3deg);
        }

        .foto:nth-child(even) {
            transform: rotate(4deg);
        }
        
        .foto:nth-child(3n) {
            transform: rotate(-1deg);
        }

        /* Efeito ao passar o mouse por cima */
        .foto:hover {
            transform: scale(1.1) rotate(0deg);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="album">
        <div class="foto">
            <img src="https://i.imgur.com/pKo7pHl.jpeg" alt="Foto 1">
        </div>
        <div class="foto">
            <img src="https://i.imgur.com/NdiQ5Ns.png" alt="Foto 2">
        </div>
        <div class="foto">
            <img src="https://i.imgur.com/CD9uwtU.jpeg" alt="Foto 3">
        </div>
        <div class="foto">
            <img src="https://i.imgur.com/xUDZbPt.jpeg" alt="Foto 4">
        </div>
        <div class="foto">
            <img src="https://i.imgur.com/g1IMEMQ.jpeg" alt="Foto 5">
        </div>
        <div class="foto">
            <img src="https://i.imgur.com/YRfB7Tj.jpeg" alt="Foto 6">
        </div>
        <div class="foto">
            <img src="https://i.imgur.com/Ro0BuKW.jpeg" alt="Foto 7">
        </div>
    </div>

</body>
</html>
